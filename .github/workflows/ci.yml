name: FastAPI CI/CD

on:
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
  
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.14'
    
    - name: Install dependencies
      run: |  
        python - m pip install --upgrade pip
        pip install ruff flake8 black
    #     pip install -e .
    
    - name: Run ruff
      run: ruff check . --output-format=github

    # - name: Run black
    #   run: black --check .