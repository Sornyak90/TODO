name: FastAPI CI/CD

on:
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Install uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
  
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.14'

    - name: Install dependencies
      run: uv sync
        
    - name: Run linting
      run: make lint

  test:
    runs-on: ubuntu-latest
    needs: lint

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
    
    - name: Install uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
      with:
        enable-cache: true
    
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.14'

    - name: Install dependencies
      run: uv sync
    
    - name: Run tests
      run: make test
  
  build_push:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Build and push image
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: |
          11ghz/todo:1.0.0
          11ghz/todo:latest
    
    - name: Clean up Docker images
      run: |
        docker rmi -f $(docker images -q) || true


  deploy-with-compose:
  runs-on: ubuntu-latest
  needs: [build_push]
  steps:
  - name: Copy docker-compose.yml
    uses: appleboy/scp-action@v0.1.7
    with:
      host: ${{ secrets.SERVER_HOST }}
      username: ${{ secrets.SERVER_USER }}
      key: ${{ secrets.SSH_PRIVATE_KEY }}
      source: "docker-compose.yml,index.html"
      target: "/opt/fastapi/TODO/"
      
  - name: Deploy with docker-compose
    uses: appleboy/ssh-action@v1.0.3
    with:
      host: ${{ secrets.SERVER_HOST }}
      username: ${{ secrets.SERVER_USER }}
      key: ${{ secrets.SSH_PRIVATE_KEY }}
      script: |
        cd /opt/fastapi/TODO
        
        # Pull and deploy new image
        docker pull 11ghz/todo:latest
        # 👇 Удалить том с данными PostgreSQL ????
        docker volume ls -q | grep postgres_data | xargs -r docker volume rm
        docker-compose down
        docker-compose up -d
        
        # Clean up old images
        docker image prune -f