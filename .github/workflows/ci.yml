name: FastAPI CI/CD

on:
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Install uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
  
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.14'

    - name: Install dependencies
      run: uv sync
        
    - name: Run linting
      run: make lint

  test:
    runs-on: ubuntu-latest
    needs: lint

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
    
    - name: Install uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
      with:
        enable-cache: true
    
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.14'

    - name: Install dependencies
      run: uv sync
    
    - name: Run tests
      run: make test
  push_image:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps: 
    - name: Push image
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: 11ghz/todo:dea105da8221
    
  deploy-with-compose:
    runs-on: ubuntu-latest
    needs: [push_image]
    steps:
    - name: Deploy with docker-compose
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          cd /opt/fastapi/TODO
          docker pull 11ghz/todo:dea105da8221
          
          # Pull latest changes and rebuild
          docker-compose down
          docker-compose up -d
          
          # Clean up old images
          docker image prune -f
    